<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strumento Pinyin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤝</text></svg>">
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root {
            --primary-color: #92A8D1;
            --primary-light: rgba(146, 168, 209, 0.15);
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #33475b;
            --success-color: #7FB069;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'PingFang SC', sans-serif; }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px 40px 20px; /* 顶部留出悬浮栏空间 */
            color: var(--text-color);
        }

        /* 顶部固定搜索栏 */
        .header-search-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        .search-container {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 12px;
            border: 1px solid #ddd;
            padding: 5px 12px;
            width: 100%;
            max-width: 600px;
            margin: 0 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: linear-gradient(135deg, rgba(255,255,255,0.7), var(--primary-light));
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.08);
            padding: 40px;
            margin-top: 20px;
        }

        h1 { margin-bottom: 25px; color: var(--primary-color); text-align: center; font-size: 2rem; }

        textarea {
            width: 100%; height: 120px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 18px;
            font-size: 16px; outline: none; resize: none;
            transition: all 0.3s ease;
        }
        textarea:focus { background: rgba(255, 255, 255, 0.6); border-color: var(--primary-color); }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .engine-selector {
            position: relative; display: flex; align-items: center;
            cursor: pointer; padding-right: 10px; border-right: 1px solid #eee;
            margin-right: 10px;
        }

        .engine-selector img { width: 20px; height: 20px; border-radius: 4px; }

        .engine-dropdown {
            position: absolute; top: 120%; left: 0;
            background: white; border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: none; z-index: 1100; width: 220px; padding: 5px;
        }

        .engine-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 6px;
            font-size: 13px; transition: background 0.2s;
            color: var(--text-color);
        }
        .engine-item:hover { background: #f5f5f5; }
        .engine-item img { width: 18px; height: 18px; }

        .search-input {
            border: none; outline: none; flex: 1;
            padding: 6px; font-size: 14px;
        }

        .search-go {
            color: var(--primary-color); cursor: pointer;
            padding: 5px; display: flex; align-items: center;
        }

        .copy-btn {
            background: var(--primary-color); border: none;
            border-radius: 10px; padding: 10px 24px;
            font-size: 13px; color: white; cursor: pointer;
            white-space: nowrap; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(146, 168, 209, 0.3);
        }
        .copy-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }

        /* 结果显示区样式 */
        .output-section {
            min-height: 250px; background: rgba(255, 255, 255, 0.5);
            border-radius: 20px; padding: 30px;
            border: 1px solid var(--glass-border);
        }

        .paragraph { margin-bottom: 1.5rem; line-height: 3; }

        .output-ruby ruby {
            ruby-align: center; margin: 0 3px;
            font-size: 16pt;
        }

        .output-ruby rt {
            font-size: 10pt; color: var(--primary-color);
            font-weight: 600;
            user-select: none;
            padding-bottom: 2px;
        }
        
        .output-ruby span { font-size: 16pt; white-space: pre-wrap; }

        .info-section {
            margin-top: 30px; border-top: 1px dashed var(--primary-color);
            padding-top: 20px;
        }

        .info-card { background: rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 20px; }
        .info-card-title { font-weight: 700; font-size: 15px; color: var(--primary-color); margin-bottom: 10px; }
        .info-card-content { font-size: 13px; line-height: 1.7; color: #5a6a85; }

        .placeholder { color: #99aab5; text-align: center; display: block; margin-top: 80px; }
    </style>
</head>
<body>

    <!-- 悬浮在最上方的搜索栏 -->
    <div class="header-search-bar">
        <div class="search-container">
            <div class="engine-selector" id="engineSelector" onclick="toggleEngineMenu(event)">
                <img id="currentEngineIcon" src="https://www.google.com/s2/favicons?domain=yihan.it" alt="engine">
                <svg style="margin-left:5px" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                <div class="engine-dropdown" id="engineDropdown"></div>
            </div>
            <input type="text" id="searchInput" class="search-input" placeholder="Seleziona testo cinese per cercare...">
            <div class="search-go" onclick="performSearch()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>Strumento Pinyin</h1>

        <textarea id="inputArea" placeholder="Inserisci i caratteri cinesi..."></textarea>

        <div class="action-bar">
            <div style="font-size: 12px; color: #888;">💡 Seleziona i caratteri sotto per cercarli sopra</div>
            <button id="copyBtn" class="copy-btn" onclick="copyContent()">
                <span id="ui-copy">Copia Pinyin + Testo</span>
            </button>
        </div>

        <div id="outputArea" class="output-section">
            <span class="placeholder">I risultati appariranno qui...</span>
        </div>

        <div class="info-section">
            <div class="info-card">
                <div class="info-card-title">ℹ️ Informazioni e Privacy</div>
                <div class="info-card-content">
                    <p>Dati: Nessun testo inserito viene raccolto, tutto avviene localmentenel browser. </p>
                    <p>GitHub: <a href="https://github.com/Christian-XM/Pinyin-Tool">https://github.com/Christian-XM/Pinyin-Tool</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { pinyin } = pinyinPro;
        const inputArea = document.getElementById('inputArea');
        const outputArea = document.getElementById('outputArea');
        const searchInput = document.getElementById('searchInput');
        const engineDropdown = document.getElementById('engineDropdown');
        const currentEngineIcon = document.getElementById('currentEngineIcon');

        const engines = [
            { id: 'yihan', name: 'yihan.it', icon: 'https://www.google.com/s2/favicons?domain=yihan.it', url: 'https://www.yihan.it/{q}' },
            { id: 'deepl', name: 'DeepL (Traduttore)', icon: 'https://www.google.com/s2/favicons?domain=deepl.com', url: 'https://www.deepl.com/translator#zh/it/{q}' },
            { id: 'cambridge', name: 'Cambridge (ZH-EN)', icon: 'https://www.google.com/s2/favicons?domain=dictionary.cambridge.org', url: 'https://dictionary.cambridge.org/zhs/词典/汉语-简体-英语/{q}' },
            { id: 'zdic', name: 'Zdic (汉典)', icon: 'https://www.google.com/s2/favicons?domain=zdic.net', url: 'https://www.zdic.net/hans/{q}' },
            { id: 'duckduckgo', name: 'DuckDuckGo', icon: 'https://www.google.com/s2/favicons?domain=duckduckgo.com', url: 'https://duckduckgo.com/?q={q}' },
            { id: 'google_trans', name: 'Google Traduttore', icon: 'https://www.google.com/s2/favicons?domain=translate.google.com', url: 'https://translate.google.com/?sl=zh-CN&tl=it&text={q}&op=translate' },
            { id: 'google', name: 'Ricerca Google', icon: 'https://www.google.com/s2/favicons?domain=google.com', url: 'https://www.google.com/search?q={q}' }
        ];

        let activeEngine = engines[0];

        function initEngines() {
            engines.forEach(eng => {
                const div = document.createElement('div');
                div.className = 'engine-item';
                div.innerHTML = `<img src="${eng.icon}"> <span>${eng.name}</span>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    activeEngine = eng;
                    currentEngineIcon.src = eng.icon;
                    engineDropdown.style.display = 'none';
                };
                engineDropdown.appendChild(div);
            });
        }

        function toggleEngineMenu(e) {
            e.stopPropagation();
            engineDropdown.style.display = engineDropdown.style.display === 'block' ? 'none' : 'block';
        }

        function performSearch() {
            const query = searchInput.value.trim();
            if (query) {
                window.open(activeEngine.url.replace('{q}', encodeURIComponent(query)), '_blank');
            }
        }

        document.addEventListener('click', () => { engineDropdown.style.display = 'none'; });
        searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });

        function updateOutput() {
            const text = inputArea.value;
            if (!text.trim()) {
                outputArea.innerHTML = `<span class="placeholder">I risultati appariranno qui...</span>`;
                return;
            }

            const paragraphs = text.split('\n');
            let html = '<div class="output-ruby">';
            paragraphs.forEach(p => {
                if(!p.trim()) return;
                html += '<div class="paragraph">';
                const tokens = p.match(/[\u4e00-\u9fa5]+|[^\u4e00-\u9fa5]+/g) || [];
                tokens.forEach(token => {
                    if (/[\u4e00-\u9fa5]+/.test(token)) {
                        const pyList = pinyin(token, { toneType: 'symbol', type: 'array' });
                        for (let i = 0; i < token.length; i++) {
                            html += `<ruby>${token[i]}<rt>${pyList[i]}</rt></ruby>`;
                        }
                    } else {
                        html += `<span>${token}</span>`;
                    }
                });
                html += '</div>';
            });
            html += '</div>';
            outputArea.innerHTML = html;
        }

        // 选词同步逻辑 (优化移动端支持)
        let selectionTimeout;
        const handleSelection = () => {
            clearTimeout(selectionTimeout);
            selectionTimeout = setTimeout(() => {
                const selection = window.getSelection();
                const text = selection.toString().trim();
                
                // 检查选中的文字是否在输出区域内
                if (text && outputArea.contains(selection.anchorNode)) {
                    // 只提取汉字部分，过滤掉可能的拼音干扰
                    const chineseOnly = text.match(/[\u4e00-\u9fa5]+/g);
                    if (chineseOnly) {
                        searchInput.value = chineseOnly.join('');
                    } else {
                        searchInput.value = text;
                    }
                }
            }, 150); // 防抖，避免选词过程频繁闪烁
        };

        // 监听多种事件确保移动端兼容性
        document.addEventListener('selectionchange', handleSelection);
        document.addEventListener('mouseup', handleSelection);
        document.addEventListener('touchend', handleSelection);

        function copyContent() {
            const text = inputArea.value;
            if (!text.trim()) return;
            let copyText = "";
            
            // 定义拼音(P)和数字(D)的正则表达式
            const pSet = "[a-zA-Zāáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜńňǹḿ]";
            const dSet = "[0-9]";
            
            text.split('\n').forEach(p => {
                if (!p.trim()) return;
                let pyLine = "", cnLine = "";
                const tokens = p.match(/[\u4e00-\u9fa5]+|[^\u4e00-\u9fa5]+/g) || [];
                tokens.forEach(t => {
                    if (/[\u4e00-\u9fa5]+/.test(t)) {
                        pyLine += pinyin(t, { toneType: 'symbol' }) + " ";
                        cnLine += t;
                    } else {
                        pyLine += t; cnLine += t;
                    }
                });

                let formattedPyLine = pyLine.trim();

                // 执行逻辑：在拼音和数字之间添加空格 (P-D 和 D-P)
                const pdRegex = new RegExp(`(${pSet})(${dSet})`, 'g');
                formattedPyLine = formattedPyLine.replace(pdRegex, '$1 $2');
                
                const dpRegex = new RegExp(`(${dSet})(${pSet})`, 'g');
                formattedPyLine = formattedPyLine.replace(dpRegex, '$1 $2');

                copyText += `${formattedPyLine}\n${cnLine.trim()}\n\n`;
            });

            const el = document.createElement('textarea');
            el.value = copyText.trim();
            document.body.appendChild(el); el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const btnText = document.getElementById('ui-copy');
            btnText.innerText = "Copiato!";
            setTimeout(() => btnText.innerText = "Copia Pinyin + Testo", 2000);
        }

        inputArea.addEventListener('input', updateOutput);
        window.onload = initEngines;
    </script>
</body>
</html>
